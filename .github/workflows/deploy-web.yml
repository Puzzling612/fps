name: Deploy Web build to GitHub Pages

# Builds the HTML5/Web export with Godot 4.6 and publishes it to GitHub Pages
# on every push to gamelike, so the latest playable build is always a URL away
# on a phone. One-time setup: repo Settings → Pages → Source = "GitHub Actions".

on:
  push:
    branches: [gamelike]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  GODOT_VERSION: "4.6"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache export templates
        id: cache-templates
        uses: actions/cache@v4
        with:
          path: ~/.local/share/godot/export_templates
          key: godot-export-templates-${{ env.GODOT_VERSION }}-stable

      - name: Install Godot headless
        run: |
          set -e
          BASE="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable"
          curl -fsSL -o godot.zip "$BASE/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q godot.zip
          sudo mv "Godot_v${GODOT_VERSION}-stable_linux.x86_64" /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          godot --version

      - name: Install export templates
        if: steps.cache-templates.outputs.cache-hit != 'true'
        run: |
          set -e
          BASE="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable"
          curl -fsSL -o templates.tpz "$BASE/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          DEST="$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          mkdir -p "$DEST"
          unzip -q templates.tpz
          mv templates/* "$DEST"/

      - name: Import project
        run: godot --headless --import || true

      - name: Export Web
        run: |
          set -e
          mkdir -p build/web
          godot --headless --export-release "Web" build/web/index.html
          # Pages serves static files as-is; .nojekyll keeps the _-prefixed assets.
          touch build/web/.nojekyll
          ls -la build/web

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
